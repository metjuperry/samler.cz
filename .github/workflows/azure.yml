name: .NET Core CI

on: [push]

env:
  AZURE_WEBAPP_NAME: samler
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore samler.cz.sln

      - name: Build
        run: dotnet build samler.cz.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish samler.cz.sln -c Release -o '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp' --no-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp'
